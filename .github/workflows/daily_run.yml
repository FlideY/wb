name: Daily Report Run

on:
  schedule:
    # Запуск каждый день в 9:00 UTC (измените под своё время)
    - cron: '0 9 * * *'
  workflow_dispatch:  # позволяет запускать вручную из интерфейса GitHub

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create credentials.json from base64
        run: echo "${{ secrets.GOOGLE_CREDENTIALS_B64 }}" | base64 -d > credentials.json

      - name: Run script
        run: python comission.py
        env:
          # Передаём путь к файлу (опционально, если скрипт его ожидает)
          GOOGLE_APPLICATION_CREDENTIALS: credentials.json

      - name: Upload logs (if needed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs
          path: |
            *.log
            output_*.csv   # если скрипт создаёт какие-то файлы